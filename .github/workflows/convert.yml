name: Convert TWSE data Transform

on:
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run conversion
        run: python trans.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dayall/
          git commit -m "convert old data to new format" || echo "no changes"
          git push
