name: Fetch TWSE Data

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 每天台灣時間 18:00 (UTC+8 → UTC 10)
  workflow_dispatch:        # 手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 強制使用 Node.js 24
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python fetch_twse_daily_v1.py
        
      - name: Commit & push data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 同步遠端，避免 push 被拒絕
          git pull origin main --rebase
          
          # 先 commit，確保工作目錄乾淨
          git add data/dayall/
          git diff --cached --quiet || git commit -m "Add TWSE data for $(date +'%Y-%m-%d')"

          # 最後推送
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
